<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Food Delivery - Horizontal Diagrams</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: #0f172a;
            font-size: 2.5rem;
            margin-bottom: 50px;
            font-weight: 800;
        }

        .diagram-container {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 50px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }

        h2 {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            color: #334155;
            font-weight: 700;
        }

        .mermaid {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            overflow-x: auto;
        }

        button.download-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        button.download-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(37, 99, 235, 0.3);
        }
    </style>
    <script>
        mermaid.initialize({
            startOnLoad: true,
            theme: 'base',
            themeVariables: {
                fontFamily: 'Inter, Segoe UI, Tahoma, sans-serif',
                primaryColor: '#e0f2fe',
                primaryBorderColor: '#0284c7',
                primaryTextColor: '#0f172a',
                lineColor: '#64748b',
                secondaryColor: '#f1f5f9',
                tertiaryColor: '#ffffff'
            },
            flowchart: {
                curve: 'basis'
            }
        });

        function downloadImage(wrapperId, filename) {
            const wrapper = document.getElementById(wrapperId);
            const svg = wrapper.querySelector('svg');

            if (!svg) {
                alert("Diagram is still loading...");
                return;
            }

            const clonedSvg = svg.cloneNode(true);
            const style = document.createElement('style');
            style.textContent = `
                * { font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important; }
            `;
            clonedSvg.insertBefore(style, clonedSvg.firstChild);

            const svgData = new XMLSerializer().serializeToString(clonedSvg);
            const canvas = document.createElement("canvas");
            const svgSize = svg.getBoundingClientRect();

            const scale = 5;
            canvas.width = svgSize.width * scale;
            canvas.height = svgSize.height * scale;

            const ctx = canvas.getContext("2d");
            ctx.scale(scale, scale);

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const img = new Image();
            const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

    <!-- 2. Class Diagram -->
    <div class="diagram-container">
        <h2>2. Class Diagram <button class="download-btn"
                onclick="downloadImage('diagram-2', 'Fig_4_2_Class_Diagram_Compressed')">Download PNG</button></h2>
        <div id="diagram-2" class="mermaid">
            graph LR
            classDef classNode fill:#ffffff,stroke:#0f172a,stroke-width:2px,color:#0f172a,rx:4,ry:4,text-align:left

            subgraph Core Architecture
            direction LR
            
            U["<div style='background:#e0f2fe; padding:8px; border-bottom:2px solid #0f172a; text-align:center; font-weight:bold;'>User</div><div style='padding:8px; font-size:12px; text-align:left;'>id: UUID<br/>name: String<br/>email: String<br/>auth_provider: String<br/>created_at: Date</div>"]:::classNode
            
            O["<div style='background:#fef3c7; padding:8px; border-bottom:2px solid #0f172a; text-align:center; font-weight:bold;'>Order</div><div style='padding:8px; font-size:12px; text-align:left;'>id: UUID<br/>user_id: UUID<br/>total_amount: Float<br/>payment_status: String<br/>order_status: String</div>"]:::classNode
            
            OI["<div style='background:#fef3c7; padding:8px; border-bottom:2px solid #0f172a; text-align:center; font-weight:bold;'>OrderItem</div><div style='padding:8px; font-size:12px; text-align:left;'>id: UUID<br/>order_id: UUID<br/>food_id: UUID<br/>name: String<br/>price: Float<br/>qty: Integer</div>"]:::classNode
            
            F["<div style='background:#dcfce7; padding:8px; border-bottom:2px solid #0f172a; text-align:center; font-weight:bold;'>FoodItem</div><div style='padding:8px; font-size:12px; text-align:left;'>id: UUID<br/>restaurant_id: UUID<br/>name: String<br/>category: String<br/>price: Float<br/>is_veg: Boolean</div>"]:::classNode
            
            R["<div style='background:#e0f2fe; padding:8px; border-bottom:2px solid #0f172a; text-align:center; font-weight:bold;'>Restaurant</div><div style='padding:8px; font-size:12px; text-align:left;'>id: UUID<br/>name: String<br/>city: String<br/>cuisines: Array<br/>is_active: Boolean</div>"]:::classNode
            
            UP["<div style='background:#f3e8ff; padding:8px; border-bottom:2px solid #0f172a; text-align:center; font-weight:bold;'>UserPreferences</div><div style='padding:8px; font-size:12px; text-align:left;'>category_scores: JSON<br/>veg_score: Float</div>"]:::classNode
            
            CH["<div style='background:#fce7f3; padding:8px; border-bottom:2px solid #0f172a; text-align:center; font-weight:bold;'>ChatHistory</div><div style='padding:8px; font-size:12px; text-align:left;'>role: String<br/>content: String<br/>created_at: Date</div>"]:::classNode
            
            UA["<div style='background:#f3e8ff; padding:8px; border-bottom:2px solid #0f172a; text-align:center; font-weight:bold;'>UserActivity</div><div style='padding:8px; font-size:12px; text-align:left;'>action_type: String<br/>weight: Integer<br/>created_at: Date</div>"]:::classNode

            U -->|"1..* places"| O
            O -->|"1..* contains"| OI
            OI -->|"*..1 references"| F
            R -->|"1..* offers"| F
            U -->|"1..1 has"| UP
            U -->|"1..* generates"| UA
            U -->|"1..* sends"| CH
            UA -->|"*..1 targets"| F
            
            end
        </div>
    </div>

    <!-- 3. Use Case Diagram -->
    <div class="diagram-container">
        <h2>3. Use Case Diagram <button class="download-btn"
                onclick="downloadImage('diagram-3', 'Fig_4_3_Use_Case_Diagram_Hz')">Download PNG</button></h2>
        <div id="diagram-3" class="mermaid">
            flowchart LR
            classDef actor fill:#f8fafc,stroke:#475569,stroke-width:2px,color:#0f172a,shape:circle
            classDef usecase fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#0f172a,rx:20,ry:20

            Customer((Customer)):::actor
            Restaurant((Restaurant Partner)):::actor
            Admin((Admin)):::actor

            subgraph System ["Smart Food Delivery Platform"]
            Login([Login & OTP Verification]):::usecase
            Browse([Browse & Filter Menu]):::usecase
            Chat([Query AI Chatbot]):::usecase
            Checkout([Checkout via Dodo]):::usecase
            ManageMenu([Manage Menu]):::usecase
            LiveOrders([Track Live Orders]):::usecase
            end
            style System fill:#ffffff,stroke:#cbd5e1,stroke-width:2px,stroke-dasharray: 5 5

            Customer -->|"Auth"| Login
            Customer -->|"Discovery"| Browse
            Customer -->|"Assistant"| Chat
            Customer -->|"Purchase"| Checkout

            Restaurant -->|"Auth"| Login
            Restaurant -->|"Portal"| ManageMenu
            Restaurant -->|"Portal"| LiveOrders

            Admin -.->|"Oversee"| System
        </div>
    </div>

    <!-- 4. Activity Diagram -->
    <div class="diagram-container">
        <h2>4. Activity Diagram <button class="download-btn"
                onclick="downloadImage('diagram-4', 'Fig_4_4_Activity_Diagram_Hz')">Download PNG</button></h2>
        <div id="diagram-4" class="mermaid">
            flowchart LR
            classDef startend fill:#0f172a,stroke:#0f172a,color:#fff,shape:rect,rx:20,ry:20
            classDef action fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#0f172a
            classDef db fill:#dcfce7,stroke:#16a34a,stroke-width:2px,color:#0f172a
            classDef decision fill:#ffedd5,stroke:#ea580c,stroke-width:2px,color:#0f172a,shape:diamond

            Start((Start)):::startend
            Login["Login OTP"]:::action
            Browse["Browse AI"]:::action
            AddToCart["Add to Cart"]:::action
            Checkout["Checkout"]:::action

            Payment{"Paid Dodo?"}:::decision

            SaveOrder[/"Save Order DB"/]:::db
            SendEmail["Email Nodemailer"]:::action
            End((End)):::startend

            Start --> Login
            Login --> Browse
            Browse --> AddToCart
            AddToCart --> Checkout
            Checkout --> Payment

            Payment -->|"Yes"| SaveOrder
            SaveOrder --> SendEmail
            SendEmail --> End

            Payment -->|"No / Cancel"| Checkout
        </div>
    </div>

    <!-- 5. Sequence Diagram -->
    <div class="diagram-container">
        <h2>5. Sequence Diagram <span style="font-size:12px; color:#64748b; font-weight:normal;">(Note: Sequence diagrams cannot be rendered horizontally)</span> <button class="download-btn"
                onclick="downloadImage('diagram-5', 'Fig_4_5_Sequence_Diagram')">Download PNG</button></h2>
        <div id="diagram-5" class="mermaid">
            sequenceDiagram
            autonumber
            actor Customer
            participant UI as React Frontend
            participant API as Node Backend
            participant Rec as Rec Engine
            participant DB as Supabase DB
            participant Pay as Dodo
            participant Email as SMTP
            
            Customer->>UI: Request OTP / Login
            UI->>API: POST /api/auth
            API->>Email: Send SMTP Code
            UI->>API: GET /recommendations
            API->>Rec: AI Prompt
            Rec->>DB: Fetch user prefs
            Rec-->>API: Returning top 10
            API-->>UI: Interactive UI Update
            Customer->>UI: Checkout Cart
            UI->>API: /create-payment
            API->>Pay: Initialize Session
            Pay-->>Customer: Capture Payment
            API->>DB: Save Order status
            API->>Email: Email HTML Invoice
        </div>
    </div>

    <!-- 6. Recommendation Pipeline -->
    <div class="diagram-container">
        <h2>6. Recommendation Pipeline <button class="download-btn"
                onclick="downloadImage('diagram-6', 'Fig_4_6_Recommendation_Pipeline_Hz')">Download PNG</button></h2>
        <div id="diagram-6" class="mermaid">
            flowchart LR
            classDef engine fill:#f3e8ff,stroke:#9333ea,stroke-width:2px,color:#0f172a,rx:8,ry:8
            classDef data fill:#f8fafc,stroke:#64748b,stroke-width:1px,color:#0f172a
            classDef target fill:#dcfce7,stroke:#16a34a,stroke-width:3px,color:#0f172a,rx:8,ry:8

            UserProfile[/"1. User Prefs"/]:::data
            DBFoods[/"2. 5000+ Foods"/]:::data

            C["Candidate Engine"]:::engine
            B["Behavior Engine"]:::engine
            R["Ranking Engine"]:::engine
            S["Similarity Engine"]:::engine
            D["Diversity Engine"]:::engine

            UserProfile --> B
            DBFoods --> C

            C -->|"Raw Candidates"| R
            B -->|"Interaction Weights"| R

            R -->|"Sorted"| S
            S -->|"Deduplicated"| D
            D -->|"Algorithmic Blend"| Final[/"Final Top 10 Picks"/]:::target
        </div>
    </div>

    <!-- 7. Chatbot Pipeline -->
    <div class="diagram-container">
        <h2>7. Chatbot Pipeline <button class="download-btn"
                onclick="downloadImage('diagram-7', 'Fig_4_7_Chatbot_Pipeline_Hz')">Download PNG</button></h2>
        <div id="diagram-7" class="mermaid">
            flowchart LR
            classDef ai fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#0f172a,rx:8,ry:8
            classDef logic fill:#f1f5f9,stroke:#64748b,stroke-width:2px,color:#0f172a,rx:8,ry:8
            classDef final fill:#dcfce7,stroke:#16a34a,stroke-width:3px,color:#0f172a,rx:8,ry:8

            Input[/"User Text Input"/]
            Local["Regex Filter"]:::logic
            Gemini15{"Gemini 1.5"}:::ai
            Gemini25{"Gemini 2.5"}:::ai
            QueryBldr["Query Builder"]:::logic
            DB[("Supabase\nDB")]
            Response["Response Format"]:::logic
            Output[/"UI Payload + Cards"/]:::final

            Input --> Local
            Local -->|"Fail"| Gemini15
            Gemini15 -->|"Prompt"| Gemini25
            Local -->|"Match"| QueryBldr
            Gemini25 -->|"JSON filters"| QueryBldr

            QueryBldr -->|"Search"| DB
            DB -->|"Data"| Response
            Response -->|"Format"| Output
        </div>
    </div>

</body>

</html>
