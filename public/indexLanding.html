<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodExpress – Order From Space</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1a1f4a, #000814 60%);
            color: white;
            overflow-x: hidden;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            position: relative;
        }

        .hero-text {
            max-width: 500px;
        }

        .hero-text h1 {
            font-size: 3rem;
            line-height: 1.2;
        }

        .hero-text span {
            color: #00f5ff;
        }

        .hero-text p {
            margin: 20px 0;
            color: #aaa;
        }

        .cta-btn {
            padding: 15px 35px;
            border: none;
            background: linear-gradient(45deg, #00f5ff, #6a00ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.4s;
        }

        .cta-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px #00f5ff;
        }

        /* DRONE CONTAINER */
        .drone-container {
            width: 400px;
            height: 400px;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* 3D ROTATION */
        .drone {
            width: 100%;
            height: 100%;
            position: absolute;
            animation: rotate 12s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        /* MENU SECTION */
        .menu {
            height: 100vh;
            background: #000814;
            padding: 100px 8%;
        }

        .menu h2 {
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: #111c44;
            padding: 20px;
            border-radius: 15px;
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px #00f5ff;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            height: 200px;
            object-fit: cover;
        }

        .card h3 {
            margin: 15px 0;
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="hero-text">
            <h1>Delivering Food<br><span>From Space</span></h1>
            <p>Ultra-fast futuristic delivery powered by next-gen drone logistics.</p>
            <button class="cta-btn" onclick="scrollToMenu()">Order From Space 🚀</button>
        </div>

        <div class="drone-container">
            <div class="drone">
                <!-- Replace this with real 3D model later -->
                <img src="https://i.imgur.com/4NJlZ7L.png" width="100%">
            </div>
        </div>
    </section>

    <section class="menu" id="menu">
        <h2>Galactic Menu</h2>
        <div class="food-grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&h=300&fit=crop"
                    alt="Burger">
                <h3>Space Burger</h3>
                <p>₹199</p>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400&h=300&fit=crop"
                    alt="Pizza">
                <h3>Orbit Pizza</h3>
                <p>₹299</p>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1621996316564-601bfdbceb25?w=400&h=300&fit=crop"
                    alt="Pasta">
                <h3>Galaxy Pasta</h3>
                <p>₹249</p>
            </div>
        </div>
    </section>

    <script>
        function scrollToMenu() {
            document.getElementById("menu").scrollIntoView({
                behavior: "smooth"
            });
        }
    </script>

</body>

</html>
